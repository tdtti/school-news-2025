<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magazine Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-lg mx-auto bg-white p-8 rounded shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-blue-600">Admin Post Editor</h2>
        
        <!-- REPLACE THE URL BELOW WITH YOUR GOOGLE APPS SCRIPT WEB APP URL -->
        <form id="adminForm" action="https://script.google.com/macros/s/AKfycbwch6bANmMeiv96e324EDlrI7XwcZG3gsRRabyoZ-Wg7ucbRdd7tAOX2aU5m_FKsnJd/exec" method="POST">
            
            <label class="block mb-2 font-bold">Post Title</label>
            <input type="text" name="title" class="w-full border p-2 mb-4 rounded" required placeholder="Sports Day 2026!">
            
            <label class="block mb-2 font-bold">Category</label>
            <select name="category" class="w-full border p-2 mb-4 rounded">
                <option value="News">News / Article</option>
                <option value="Photo">Photo Gallery</option>
                <option value="Video">Video Post</option>
            </select>
            
            <label class="block mb-2 font-bold">Article Details</label>
            <textarea name="description" rows="5" class="w-full border p-2 mb-4 rounded" required placeholder="Write your news here..."></textarea>
            
            <label class="block mb-2 font-bold">Photo/Video Link</label>
            <input type="text" name="mediaUrl" class="w-full border p-2 mb-4 rounded" placeholder="ImgBB direct link or YouTube URL">
            
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">Publish Post</button>
        </form>
        <p id="statusMessage" class="mt-4 text-green-600 font-bold hidden">Post Published Successfully!</p>
    </div>

    <script>
        document.getElementById('adminForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page reload
            var form = this;
            fetch(form.action, {
                method: 'POST',
                body: new URLSearchParams(new FormData(form))
            }).then(() => {
                document.getElementById('statusMessage').classList.remove('hidden');
                form.reset();
                setTimeout(() => document.getElementById('statusMessage').classList.add('hidden'), 3000);
            });
        });
    </script>
</body>
</html>
