<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Magazine & News</title>
    <style>
        body { font-family: 'Georgia', serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #003366; color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; }
        .post { background: white; padding: 20px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .post-date { color: #888; font-size: 0.9em; margin-bottom: 10px; }
        .post-title { font-size: 1.8em; margin: 0 0 10px 0; color: #333; }
        .post-content { line-height: 1.6; }
        .post-media img { max-width: 100%; border-radius: 5px; margin-top: 15px;}
        .post-media iframe { width: 100%; height: 400px; margin-top: 15px; border: none;}
    </style>
</head>
<body>

    <header>
        <h1>Daily School Magazine</h1>
        <p>News, Photos, and Videos from our Campus</p>
    </header>

    <div class="container" id="news-feed">
        <h2>Loading today's news...</h2>
    </div>

    <script>
        const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbzmyzl-vK0EY-_DtDom_4fhs20zOamhTLns2RBTGW4Td46NJWKMOZNnPBCtvZgy69me/exec';

        // Function to transform standard YouTube link to Embed link
        function getYoutubeEmbed(url) {
            let videoId = url.split('v=')[1];
            if(!videoId) return url;
            let ampersandPosition = videoId.indexOf('&');
            if(ampersandPosition !== -1) videoId = videoId.substring(0, ampersandPosition);
            return `https://www.youtube.com/embed/${videoId}`;
        }

        fetch(googleScriptUrl)
            .then(response => response.json())
            .then(data => {
                const feed = document.getElementById('news-feed');
                feed.innerHTML = ''; // clear loading text

                data.forEach(post => {
                    if(!post.Title) return; // Skip empty rows

                    let mediaHTML = '';
                    if (post.Type === 'photo' && post.MediaURL) {
                        mediaHTML = `<div class="post-media"><img src="${post.MediaURL}" alt="News Image"></div>`;
                    } else if (post.Type === 'video' && post.MediaURL) {
                        mediaHTML = `<div class="post-media"><iframe src="${getYoutubeEmbed(post.MediaURL)}" allowfullscreen></iframe></div>`;
                    }

                    const postElement = document.createElement('div');
                    postElement.className = 'post';
                    postElement.innerHTML = `
                        <div class="post-date">${new Date(post.Date).toLocaleDateString()}</div>
                        <h2 class="post-title">${post.Title}</h2>
                        <div class="post-content">${post.Content}</div>
                        ${mediaHTML}
                    `;
                    feed.appendChild(postElement);
                });
            })
            .catch(error => {
                document.getElementById('news-feed').innerHTML = '<p>Error loading news.</p>';
            });
    </script>
</body>
</html>
