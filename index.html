<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our School Magazine</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-blue-800 text-white text-center py-10 shadow-md">
        <h1 class="text-5xl font-extrabold tracking-tight">The Campus Chronicle</h1>
        <p class="mt-2 text-lg text-blue-200">The Official Daily School Online Magazine</p>
    </header>

    <!-- News Feed Section -->
    <main class="max-w-6xl mx-auto p-6 mt-6">
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center col-span-3 text-gray-500">Loading today's news...</p>
        </div>
    </main>

    <script>
        // Helper to turn YouTube links into Embeds
        function getEmbedUrl(url) {
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = url.includes('v=') ? url.split('v=')[1].substring(0, 11) : url.split('.be/')[1].substring(0, 11);
                return `https://www.youtube.com/embed/${videoId}`;
            }
            return url;
        }

        // Fetch Data from Google Sheets
        async function loadNews() {
            // REPLACE THIS URL WITH YOUR GOOGLE WEB APP URL
            const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbwPFOBkwFVYAoQ7NH1OwoA0gvOXrjVC6SrBvrH8Vh4KzTKOoDOoFqOtE2OPHNb47nWU/exec"; 
            
            try {
                const response = await fetch(GOOGLE_APP_URL);
                const data = await response.json();
                
                const container = document.getElementById('news-container');
                container.innerHTML = ""; // Clear loading text

                data.forEach(post => {
                    let mediaHTML = "";
                    
                    if(post.category === "Video" && post.mediaUrl) {
                        mediaHTML = `<iframe class="w-full h-48 object-cover" src="${getEmbedUrl(post.mediaUrl)}" frameborder="0" allowfullscreen></iframe>`;
                    } else if (post.mediaUrl) {
                        mediaHTML = `<img src="${post.mediaUrl}" class="w-full h-48 object-cover" alt="News Image">`;
                    }

                    const card = `
                        <div class="bg-white rounded-lg shadow-lg overflow-hidden flex flex-col hover:shadow-xl transition-shadow">
                            ${mediaHTML}
                            <div class="p-5 flex-grow">
                                <span class="text-xs font-bold uppercase tracking-wider ${post.category === 'Video' ? 'text-red-500' : 'text-blue-500'}">${post.category}</span>
                                <h3 class="text-xl font-bold mt-2 text-gray-800">${post.title}</h3>
                                <p class="text-xs text-gray-400 mt-1 mb-4">${new Date(post.date).toLocaleDateString()}</p>
                                <p class="text-gray-600 text-sm whitespace-pre-wrap">${post.description}</p>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                document.getElementById('news-container').innerHTML = "<p>Error loading news. Please try again later.</p>";
            }
        }

        // Load news on page load
        loadNews();
    </script>
</body>
</html>
